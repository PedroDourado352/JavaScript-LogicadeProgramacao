<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>BMI Calculator</title>
</head>
<body>
    <main class="container">
        <h1 class="title">Calculadora de IMC</h1>

        <div class="input-group">
            <label for="name">Nome</label>
            <input type="text" id="name" placeholder="Digite seu nome" />
        </div>

        <div class="input-group">
            <label for="altura">Altura (m)</label>
            <input type="number" id="altura" step="0.01" min="0" placeholder="Ex: 1.75" />
        </div>

        <div class="input-group">
            <label for="peso">Peso (kg)</label>
            <input type="number" id="peso" step="0.1" min="0" placeholder="Ex: 70.5" />
        </div>

        <button id="calcular" type="button">Calcular</button>

        <section class="result" id="resultado" aria-live="polite">
            Preencha os dados para calcular o IMC.
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
