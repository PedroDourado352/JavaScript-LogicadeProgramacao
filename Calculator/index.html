<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Calculadora</title>
</head>
<body>
    <main class="calculator">  <!-- Adicionei a classe "calculator" para estilização -->
        <h1>Calculadora</h1>
        <div class="display" id="display" aria-live="polite">0</div>

        <div class="keys">
            <button class="key function" data-action="clear">C</button>
            <button class="key function" data-action="delete">⌫</button>
            <button class="key operator" data-value="/">÷</button>
            <button class="key operator" data-value="*">×</button>

            <button class="key" data-value="7">7</button>
            <button class="key" data-value="8">8</button>
            <button class="key" data-value="9">9</button>
            <button class="key operator" data-value="-">−</button>

            <button class="key" data-value="4">4</button>
            <button class="key" data-value="5">5</button>
            <button class="key" data-value="6">6</button>
            <button class="key operator" data-value="+">+</button>

            <button class="key" data-value="1">1</button>
            <button class="key" data-value="2">2</button>
            <button class="key" data-value="3">3</button>
            <button class="key equal" data-action="equals" rowspan="2">=</button>

            <button class="key zero" data-value="0">0</button>
            <button class="key" data-value=".">.</button>
        </div>
    </main>

    <script src="index.js"></script>
</body>
</html>
